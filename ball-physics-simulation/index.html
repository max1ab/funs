<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>小球生成图像模拟器</title>
<script defer src="https://cloud.umami.is/script.js" data-website-id="5d9aab85-626c-4d4d-a3c6-c4576f4f45bd"></script>
<style>
  html,body{height:100%;margin:0;background:#000;color:#ccc;font-family:system-ui,Segoe UI,Roboto,"Helvetica Neue",Arial;}
  .wrap{display:flex;gap:16px;padding:16px;height:100%;box-sizing:border-box;}
  .left{flex:1;display:flex;flex-direction:column;gap:8px;}
  canvas{background:#000;border:1px solid #ccc;border-radius:8px;display:block;width:100%;height:100%;}
  .controls{flex:0 0 320px;padding:12px;background:#000;}
   .controls h3{margin:0 0 8px 0;font-size:18px;color:#fff}
  .row{display:flex;align-items:center;gap:8px;margin:8px 0}
   .row label.small{min-width:100px;text-align:left;}
  input[type=range]{width:160px;-webkit-appearance:none;appearance:none;height:4px;background:#333;border-radius:2px;outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;background:#fff;border-radius:50%;cursor:pointer;}
  input[type=range]::-moz-range-thumb{width:16px;height:16px;background:#fff;border-radius:50%;cursor:pointer;border:none;}
  button{padding:8px 10px;border-radius:6px;border:1px solid #ccc;background:#000;color:#ccc;cursor:pointer;transition:all 0.2s;font-size:14px;}
   button:hover{background:#111;color:#fff;border-color:#fff;}
   input[type=number]{background:#000;border:1px solid #333;color:#ccc;border-radius:4px;padding:4px 8px;}
   .small{font-size:14px;color:#999}
   .stat{font-size:13px;margin-top:8px;color:#ccc}
  
  /* 手机设备适配 */
  @media (max-width: 768px) {
    .wrap {
      flex-direction: column;
      gap: 4px;
      padding: 8px;
    }
    
    .left {
      flex: none;
      width: 100%;
    }
    
    .left canvas {
      max-width: 100%;
      max-height: 100%;
    }
    
    .controls {
      flex: none;
      padding: 16px;
      font-size: 16px;
    }
    
    .controls h3 {
      font-size: 18px;
      margin-bottom: 12px;
    }
    
    .row {
      margin: 12px 0;
      gap: 12px;
    }
    
    input[type=range] {
      width: 120px;
      /* height: 32px; */
    }
    
    button {
      padding: 12px 16px;
      font-size: 16px;
      min-height: 44px;
      border-radius: 8px;
    }
    
    .small {
       font-size: 15px;
       min-width: 80px;
     }
     
     .row label.small {
       min-width: 120px;
       text-align: left;
     }
    
    .stat {
       font-size: 15px;
       margin-top: 12px;
       padding: 12px;
       background: #000;
       border: 1px solid #333;
       border-radius: 6px;
       color: #ccc;
     }
    
    input[type=number] {
       font-size: 16px;
       padding: 8px;
       min-height: 32px;
       background: #000;
       border: 1px solid #333;
       color: #ccc;
       border-radius: 4px;
     }
    
    #useDefault {
      width: 100%;
    }
  }
  
  /* 更小屏幕的进一步优化 */
  @media (max-width: 480px) {
    .wrap {
      padding: 6px;
      gap: 2px;
    }
    
    .left {
      max-height: 55vh;
    }
    
    .controls {
      padding: 12px;
    }
    
    .row {
      flex-wrap: wrap;
    }
    
    input[type=range] {
      width: 100px;
    }
    
    button {
      padding: 10px 14px;
      font-size: 15px;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="left">
    <canvas id="c"></canvas>
  </div>
  <div class="controls">
    <h3>小球模拟器</h3>
    <div class="progress-container" style="margin-bottom: 10px;">
      <div class="progress-bar" style="width: 100%; height: 8px; background-color: #e0e0e0; border-radius: 4px; overflow: hidden;">
        <div id="progressFill" style="width: 0%; height: 100%; background-color: #4CAF50; transition: width 0.3s ease;"></div>
      </div>
      <div id="progressText" style="font-size: 12px; color: #666; margin-top: 4px; text-align: center;">准备开始</div>
    </div>
    <div class="row">
      <input type="file" id="avatarUpload" accept="image/*" style="display:none">
      <button id="calculateBtn">计算位置</button>
       <button id="animateBtn" disabled>模拟动画</button>
       <button id="selectImageBtn">选择图片</button>
    </div>
    <div class="row"><label class="small">重力：</label><input id="gravity" type="range" min="0" max="200" step="1" value="50"><span id="gVal" class="small">50</span></div>
    <div class="row"><label class="small">发射速度：</label><input id="spawnSpeed" type="range" min="1" max="100" step="1" value="80"><span id="spVal" class="small">80</span></div>
    <div class="row"><label class="small">每次发射数：</label><input id="ballsPerShot" type="range" min="1" max="10" step="1" value="4"><span id="bpsVal" class="small">4</span></div>
    <div class="row"><label class="small">目标小球数：</label><input id="targetCount" type="range" min="100" max="2000" value="900" step="100"><span id="countVal" class="small">900</span></div>
    <div class="stat">
      当前小球: <strong id="count">0</strong>
    </div>
    <canvas id="avatarCanvas" style="display:none;"></canvas>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', {alpha:false});
  
  // 头像长宽比例，需要在fitCanvasToParent之前声明
  let avatarAspectRatio = 1; // 默认为1:1
  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const rect = canvas.getBoundingClientRect();
    canvas.width = Math.floor(rect.width * dpr);
    canvas.height = Math.floor(rect.height * dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  function fitCanvasToParent(){
    const left = document.querySelector('.left');
    const rect = left.getBoundingClientRect();
    
    // 检查是否为手机端
    const isMobile = window.innerWidth <= 768;
    
    let canvasWidth, canvasHeight;
    
    if (isMobile) {
      // 手机端：使用容器实际可用宽度，考虑padding
      const availableWidth = rect.width;
      const availableHeight = window.innerHeight * 0.55; // 为控制面板留出空间
      
      // 根据头像比例计算最佳尺寸
      if (avatarAspectRatio > 1) {
        // 头像更宽
        canvasWidth = Math.min(availableWidth, availableHeight * avatarAspectRatio);
        canvasHeight = canvasWidth / avatarAspectRatio;
      } else {
        // 头像更高或正方形
        canvasHeight = Math.min(availableHeight, availableWidth / avatarAspectRatio);
        canvasWidth = canvasHeight * avatarAspectRatio;
      }
      
      // 确保不超出容器范围
      if (canvasWidth > availableWidth) {
        canvasWidth = availableWidth;
        canvasHeight = canvasWidth / avatarAspectRatio;
      }
      if (canvasHeight > availableHeight) {
        canvasHeight = availableHeight;
        canvasWidth = canvasHeight * avatarAspectRatio;
      }
    } else {
      // 桌面端：根据头像长宽比例调整画布尺寸
      if (avatarAspectRatio > 1) {
        // 头像更宽，以容器宽度为基准
        canvasWidth = Math.max(300, Math.min(rect.width, rect.height * avatarAspectRatio));
        canvasHeight = canvasWidth / avatarAspectRatio;
      } else {
        // 头像更高或正方形，以容器高度为基准
        canvasHeight = Math.max(300, Math.min(rect.height, rect.width / avatarAspectRatio));
        canvasWidth = canvasHeight * avatarAspectRatio;
      }
      
      // 确保画布不超出容器范围
      if (canvasWidth > rect.width) {
        canvasWidth = rect.width;
        canvasHeight = canvasWidth / avatarAspectRatio;
      }
      if (canvasHeight > rect.height) {
        canvasHeight = rect.height;
        canvasWidth = canvasHeight * avatarAspectRatio;
      }
    }
    
    canvas.style.width = canvasWidth + 'px';
    canvas.style.height = canvasHeight + 'px';
    resize();
  }
  window.addEventListener('resize', () => { fitCanvasToParent(); resize(); });
  fitCanvasToParent();

  const avatarUpload = document.getElementById('avatarUpload');
  const calculateBtn = document.getElementById('calculateBtn');
  const animateBtn = document.getElementById('animateBtn');
  const selectImageBtn = document.getElementById('selectImageBtn');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');
  const gravityRange = document.getElementById('gravity');
  const gVal = document.getElementById('gVal');
  const spawnSpeedRange = document.getElementById('spawnSpeed');
  const spVal = document.getElementById('spVal');
  const ballsPerShotRange = document.getElementById('ballsPerShot');
  const bpsVal = document.getElementById('bpsVal');
  
  // 固定值
  const restitution = 0.8;
  const substeps = 12;
  const targetCountInput = document.getElementById('targetCount');
  const countSpan = document.getElementById('count');
  const avatarCanvas = document.getElementById('avatarCanvas');
  const avatarCtx = avatarCanvas.getContext('2d');

  function UIupdate(){ 
    gVal.textContent = gravityRange.value; 
    spVal.textContent = spawnSpeedRange.value; 
    bpsVal.textContent = ballsPerShotRange.value; 
    countSpan.textContent = balls.length; 
    countVal.textContent = targetCountInput.value;
  }
  
  function updateProgress() {
    if (isCalculating && avatarImageData) {
      const targetCount = parseInt(targetCountInput.value);
      const currentCount = balls.length;
      const progress = Math.min((currentCount / targetCount) * 99, 99); // 最多显示99%
      
      progressFill.style.width = progress + '%';
      progressText.textContent = `正在计算位置... ${currentCount}/${targetCount} (${Math.round(progress)}%)`;
    }
  }
  
  function resetProgress() {
    progressFill.style.width = '0%';
    progressText.textContent = '设置已修改，需要重新计算';
  }
  
  function onSettingsChange() {
    UIupdate();
    
    // 如果正在计算中，停止计算并重置状态
    if (isCalculating) {
      isCalculating = false;
      // running = false;
      mode = 'idle';
      calculateBtn.textContent = '重新计算';
      calculateBtn.disabled = false;
      animateBtn.disabled = true;
      resetProgress();
    }
    // 如果已经计算过位置，将按钮改为重新计算
    else if (ballPositions.length > 0) {
      calculateBtn.textContent = '重新计算';
      resetProgress();
    }
  }
  
  gravityRange.oninput = onSettingsChange;
  spawnSpeedRange.oninput = onSettingsChange;
  ballsPerShotRange.oninput = () => { 
    computeRadius(); 
    onSettingsChange();
  };
  targetCountInput.oninput = () => { 
     computeRadius(); 
     onSettingsChange();
   };

  // 图片和状态管理
  let avatarImageData = null;
  let ballPositions = [];
  let mode = 'idle'; // 'idle', 'calculating', 'stable', 'generating'
  let running = false;
  let isCalculating = false;
  let stableFrameCount = 0;
  const STABLE_THRESHOLD = 180; // 3秒稳定时间
  
  // 事件处理
  avatarUpload.onchange = handleAvatarUpload;
  calculateBtn.onclick = startCalculation;
  animateBtn.onclick = startAnimation;
  selectImageBtn.onclick = () => {
    avatarUpload.click();
  };
  
  // 画布点击事件 - 上传图片
  canvas.onclick = () => {
    if (!avatarImageData) {
      avatarUpload.click();
    }
  };
  canvas.style.cursor = 'pointer';

  function containerSize(){
    const rect = canvas.getBoundingClientRect();
    const padding = 0;
    return {x:padding, y:padding, w:rect.width - padding*2, h:rect.height - padding*2};
  }

  let balls = [];
  let frameCount = 0;
  let lastSpawnFrame = 0;

  function computeRadius(){
    const targetCount = Math.max(1, parseInt(targetCountInput.value,10) || 900);
    const box = containerSize();
    
    // 使用最密堆积原理计算半径
    // 最密堆积的填充率约为 π/(2√3) ≈ 0.9069，但考虑到实际物理模拟的限制，使用0.74
    const packingEfficiency = 0.85;
    const containerArea = box.w * box.h;
    const totalBallArea = containerArea * packingEfficiency;
    const singleBallArea = totalBallArea / targetCount;
    const r = Math.sqrt(singleBallArea / Math.PI);
    
    return Math.max(2, r);
    // return Math.max(2, Math.floor(r));
  }
  let R = computeRadius();

  class SpatialHash {
    constructor(cellSize, w, h) {
      this.cellSize = cellSize;
      this.cols = Math.ceil(w / cellSize);
      this.rows = Math.ceil(h / cellSize);
      this.buckets = new Map();
    }
    _key(col,row){ return col + ',' + row; }
    clear(){ this.buckets.clear(); }
    insert(id, x, y){
      const col = Math.floor(x / this.cellSize);
      const row = Math.floor(y / this.cellSize);
      const k = this._key(col,row);
      if(!this.buckets.has(k)) this.buckets.set(k, []);
      this.buckets.get(k).push(id);
    }
    queryNeighbors(x, y){
      const col = Math.floor(x / this.cellSize);
      const row = Math.floor(y / this.cellSize);
      const result = [];
      for(let i = col-1; i <= col+1; i++){
        for(let j = row-1; j <= row+1; j++){
          const k = this._key(i,j);
          if(this.buckets.has(k)) result.push(...this.buckets.get(k));
        }
      }
      return result;
    }
  }

  // 头像处理函数
  function handleAvatarUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    const img = new Image();
    img.onload = () => {
      processImage(img);
    };
    img.src = URL.createObjectURL(file);
  }
  
  function processImage(img) {
    // 计算新图片的长宽比例
    const newAspectRatio = img.width / img.height;
    
    // 如果新图片的比例与原图片不同，重置整个状态
    if (avatarImageData && Math.abs(avatarAspectRatio - newAspectRatio) > 0.01) {
      // 重置所有状态
      running = false;
      isCalculating = false;
      mode = 'idle';
      ballPositions = [];
      balls = [];
      frameCount = 0;
      lastSpawnFrame = 0;
      stableFrameCount = 0;
      
      // 重置进度条
      resetProgress();
    }
    
    // 保存图片的原始长宽比例
    avatarAspectRatio = newAspectRatio;
    
    const size = 128; // 提高分辨率以获得更好的颜色细节
    avatarCanvas.width = size;
    avatarCanvas.height = size;
    
    // 绘制并缩放图像
    avatarCtx.drawImage(img, 0, 0, size, size);
    avatarImageData = avatarCtx.getImageData(0, 0, size, size);
    
    // 清空颜色缓存，确保新图片的颜色能正确提取
    colorCache.clear();
    
    // 更新画布尺寸以匹配图片比例
    fitCanvasToParent();
    
    progressText.textContent = '图片已加载，点击计算位置开始';
    canvas.style.cursor = 'default';
    
    // 重置状态
    resetSim();
  }
  
  function startCalculation() {
    if (!avatarImageData) {
      progressText.textContent = '请先上传图片';
      return;
    }
    
    // 清空所有小球和相关状态
    balls = [];
    ballPositions = [];
    frameCount = 0;
    lastSpawnFrame = 0;
    stableFrameCount = 0;
    
    // 重新计算小球半径
    R = computeRadius();
    
    mode = 'calculating';
    running = true;
    isCalculating = true;
    calculateBtn.textContent = '重新计算';
    
    // 重置动画按钮状态
    animateBtn.disabled = true;
    animateBtn.textContent = '模拟动画';
    animateBtn.onclick = startAnimation;
     
    // 初始化进度条
    progressFill.style.width = '0%';
    progressText.textContent = '开始计算...';
  }
  
  function checkStability() {
    if (mode !== 'calculating' || balls.length === 0) return;
    
    // 检查所有小球是否稳定（速度很小）
    let isStable = true;
    const threshold = 0.5; // 速度阈值
    
    for (const ball of balls) {
      const vx = ball.x - ball.oldX;
      const vy = ball.y - ball.oldY;
      const speed = Math.sqrt(vx * vx + vy * vy);
      
      if (speed > threshold) {
        isStable = false;
        break;
      }
    }
    
    if (isStable) {
      stableFrameCount++;
      if (stableFrameCount >= STABLE_THRESHOLD) {
        // 小球已稳定
        ballPositions = balls.map(b => ({x: b.x, y: b.y}));
        mode = 'stable';
        running = false;
        isCalculating = false;
        calculateBtn.textContent = '计算位置';
        animateBtn.disabled = false;
        
        // 完成进度条
        progressFill.style.width = '100%';
        progressText.textContent = `位置计算完成，点击模拟动画生成图片`;
      }
    } else {
      stableFrameCount = 0;
    }
  }
  
  function checkAnimationStability() {
    if (mode !== 'animating' || balls.length === 0) return;
    
    // 检查所有小球是否静止（速度很小）
    let isStable = true;
    const threshold = 0.3; // 动画模式下使用更严格的阈值
    
    for (const ball of balls) {
      const vx = ball.x - ball.oldX;
      const vy = ball.y - ball.oldY;
      const speed = Math.sqrt(vx * vx + vy * vy);
      
      if (speed > threshold) {
        isStable = false;
        break;
      }
    }
    
    if (isStable) {
      stableFrameCount++;
      if (stableFrameCount >= STABLE_THRESHOLD) {
        // 小球已静止，自动停止动画
        stopAnimation(true);
      }
    } else {
      stableFrameCount = 0;
    }
  }
  
  function startAnimation() {
    if (ballPositions.length === 0) {
      progressText.textContent = '请先完成位置计算';
      return;
    }
    
    mode = 'animating';
    running = true;
    stableFrameCount = 0; // 重置静止计数器
    // 重新生成小球（用于重新模拟）
    balls = [];
    frameCount = 0;
    lastSpawnFrame = 0;
    R = computeRadius();
    animateBtn.textContent = '停止动画';
    animateBtn.onclick = () => stopAnimation(false);
    progressText.textContent = '动画模拟运行中...';
  }
  
  function stopAnimation(isAutoStop = false) {
    running = false;
    mode = 'idle';
    
    if (isAutoStop) {
      // 自动停止：显示重新模拟
      animateBtn.textContent = '重新模拟';
      animateBtn.onclick = startAnimation;
      progressText.textContent = '小球已静止，动画自动停止';
    } else {
      // 手动停止：显示继续动画
      animateBtn.textContent = '继续动画';
      animateBtn.onclick = continueAnimation;
      progressText.textContent = '动画已停止';
    }
  }
  
  function continueAnimation() {
    mode = 'animating';
    running = true;
    stableFrameCount = 0; // 重置静止计数器
    // 重置时间相关变量，确保小球发射时机正确
    lastSpawnFrame = frameCount;
    // 不重新生成小球，保持当前状态继续动画
    animateBtn.textContent = '停止动画';
    animateBtn.onclick = () => stopAnimation(false);
    progressText.textContent = '动画模拟运行中...';
  }
  
  // 颜色缓存，避免重复计算
  const colorCache = new Map();
  
  function getAvatarColor(x, y) {
    if (!avatarImageData) return '#ffffff';
    
    const box = containerSize();
    // 使用浮点数坐标进行更精确的映射
    const avatarX = (x - box.x) / box.w * avatarImageData.width;
    const avatarY = (y - box.y) / box.h * avatarImageData.height;
    
    // 边界检查
    if (avatarX < 0 || avatarX >= avatarImageData.width || avatarY < 0 || avatarY >= avatarImageData.height) {
      return '#ffffff';
    }
    
    // 生成缓存键
    const cacheKey = `${Math.round(avatarX * 10)}_${Math.round(avatarY * 10)}`;
    if (colorCache.has(cacheKey)) {
      return colorCache.get(cacheKey);
    }
    
    // 双线性插值获取更平滑的颜色
    const x1 = Math.floor(avatarX);
    const y1 = Math.floor(avatarY);
    const x2 = Math.min(x1 + 1, avatarImageData.width - 1);
    const y2 = Math.min(y1 + 1, avatarImageData.height - 1);
    
    const fx = avatarX - x1;
    const fy = avatarY - y1;
    
    // 获取四个角的颜色
    const getPixel = (px, py) => {
      const index = (py * avatarImageData.width + px) * 4;
      return {
        r: avatarImageData.data[index],
        g: avatarImageData.data[index + 1],
        b: avatarImageData.data[index + 2]
      };
    };
    
    const c1 = getPixel(x1, y1);
    const c2 = getPixel(x2, y1);
    const c3 = getPixel(x1, y2);
    const c4 = getPixel(x2, y2);
    
    // 双线性插值
    const r = Math.round(
      c1.r * (1 - fx) * (1 - fy) +
      c2.r * fx * (1 - fy) +
      c3.r * (1 - fx) * fy +
      c4.r * fx * fy
    );
    const g = Math.round(
      c1.g * (1 - fx) * (1 - fy) +
      c2.g * fx * (1 - fy) +
      c3.g * (1 - fx) * fy +
      c4.g * fx * fy
    );
    const b = Math.round(
      c1.b * (1 - fx) * (1 - fy) +
      c2.b * fx * (1 - fy) +
      c3.b * (1 - fx) * fy +
      c4.b * fx * fy
    );
    
    // 颜色增强：提高饱和度和对比度
    const enhancedR = Math.min(255, Math.max(0, r * 1.1));
    const enhancedG = Math.min(255, Math.max(0, g * 1.1));
    const enhancedB = Math.min(255, Math.max(0, b * 1.1));
    
    const color = `rgb(${Math.round(enhancedR)},${Math.round(enhancedG)},${Math.round(enhancedB)})`;
    
    // 缓存结果
    if (colorCache.size > 1000) {
      colorCache.clear(); // 防止内存泄漏
    }
    colorCache.set(cacheKey, color);
    
    return color;
  }

  function addBall(px, py, vx=0, vy=0){
    const r = R;
    let color;
    
    if (mode === 'calculating') {
      color = '#ffffff';
    } else if (mode === 'animating' && ballPositions.length > balls.length) {
      const pos = ballPositions[balls.length];
      color = getAvatarColor(pos.x, pos.y);
    } else {
      // 使用固定颜色而不是随机颜色
      const ballIndex = balls.length;
      const hue = (ballIndex * 137.5) % 360; // 使用黄金角度分布
      color = `hsl(${hue} 70% 60%)`;
    }
    
    // 基于位置的Verlet积分：存储当前位置和上一帧位置
    balls.push({
      x: px, y: py,           // 当前位置
      oldX: px - vx/60, oldY: py - vy/60,  // 上一帧位置（基于初始速度估算）
      r: r, m: r*r,           // 半径和质量（质量 = 半径平方，密度相同）
      color: color
    });
  }

  function resetSim(){
    balls = [];
    frameCount = 0;
    lastSpawnFrame = 0;
    stableFrameCount = 0;
    R = computeRadius();
    
    if (mode === 'idle') {
      if (!avatarImageData) {
        canvas.style.cursor = 'pointer';
        // 重置进度条为准备状态
        progressFill.style.width = '0%';
        progressText.textContent = '点击画布上传图片';
      } else {
        canvas.style.cursor = 'default';
        // 只有在没有计算过位置时才重置进度条
        if (ballPositions.length === 0) {
          progressFill.style.width = '0%';
          progressText.textContent = '图片已加载，点击计算位置开始';
        } else {
          // 保持计算完成状态
          progressFill.style.width = '100%';
          progressText.textContent = `位置计算完成，记录了${ballPositions.length}个位置`;
        }
      }
    }
    
    // 重置按钮状态
    if (!isCalculating) {
       calculateBtn.textContent = '计算位置';
     }
     if (mode !== 'animating') {
       animateBtn.disabled = ballPositions.length === 0;
       // 只有在真正需要重置时才改变按钮文本
       if (animateBtn.textContent === '停止动画') {
         animateBtn.textContent = '模拟动画';
         animateBtn.onclick = startAnimation;
       }
     }
    
    UIupdate();
  }
  resetSim();

  const emitter = { margin: 12 };

  // 连续喷射模式
  function spawnStep(now){
    if (!running) return;
    
    const target = Math.max(1, parseInt(targetCountInput.value,10) || 900);
    
    // 动画模式：按记录的位置数量生成
    if (mode === 'animating') {
      if (balls.length >= ballPositions.length) {
        // 动画模式下不停止，继续运行
        return;
      }
    } else if (balls.length >= target) {
      return;
    }
    
    const spawnSpeed = parseFloat(spawnSpeedRange.value);
    const spawnInterval = 120 - spawnSpeed + R; // 发射速度与间隔成反比，速度1对应50ms，速度50对应1ms
    const frameInterval = spawnInterval / 16.67; // 转换为帧间隔 (60fps)
    if(frameCount - lastSpawnFrame < frameInterval) return;
    lastSpawnFrame = frameCount;
    
    const box = containerSize();
    const ballsPerShot = parseInt(ballsPerShotRange.value, 10) || 1;
    
    // 一次发射多个小球
    for (let i = 0; i < ballsPerShot; i++) {
      // 检查是否已达到目标数量
      if (mode === 'generating') {
        if (balls.length >= ballPositions.length) break;
      } else if (balls.length >= target) {
        break;
      }
      
      const sx = box.x + emitter.margin;
      const sy = box.y + emitter.margin + i * R * 2.1; // 垂直偏移避免重叠
      
      // 使用确定性速度，根据小球索引产生轻微变化
       const baseVx = spawnSpeed;
       const baseVy = 1;
       const vx = baseVx// + (i % 3 - 1) * 10; // 确定性水平速度变化：-30, 0, 30
       const vy = baseVy//baseVy + (i % 2) * 2;     // 确定性垂直速度变化：0, 20
      
      addBall(sx, sy, vx, vy);
    }
  }

  // 基于位置的碰撞检测和约束求解
  function solveBallCollisions(){
    const cellSize = R*2;
    const box = containerSize();
    const hash = new SpatialHash(cellSize, box.w + box.x*2, box.h + box.y*2);
    for(let i=0;i<balls.length;i++) hash.insert(i, balls[i].x, balls[i].y);
    
    for(let i=0;i<balls.length;i++){
      const ball1 = balls[i];
      const neighbors = hash.queryNeighbors(ball1.x, ball1.y);
      for(const j of neighbors){
        if(j <= i) continue;
        const ball2 = balls[j];
        
        const dx = ball2.x - ball1.x;
        const dy = ball2.y - ball1.y;
        const distance = Math.sqrt(dx*dx + dy*dy);
        const minDistance = ball1.r + ball2.r;
        
        if(distance < minDistance && distance > 0){
          const overlap = minDistance - distance;
          const nx = dx / distance;
          const ny = dy / distance;
          
          // 由于所有小球质量相同，简化为均分重叠距离
          const moveDistance = overlap * 0.5;
          
          ball1.x -= nx * moveDistance;
          ball1.y -= ny * moveDistance;
          ball2.x += nx * moveDistance;
          ball2.y += ny * moveDistance;
        }
      }
    }
  }
  
  function solveBoundaryCollisions(){
    const box = containerSize();
    
    for(const ball of balls){
      // 保存原始速度
      const originalVx = ball.x - ball.oldX;
      const originalVy = ball.y - ball.oldY;
      
      // 左边界
      if(ball.x - ball.r < box.x){
        ball.x = box.x + ball.r;
        ball.oldX = ball.x + originalVx * restitution; // 反向弹性速度
      }
      
      // 右边界
      if(ball.x + ball.r > box.x + box.w){
        ball.x = box.x + box.w - ball.r;
        ball.oldX = ball.x + originalVx * restitution; // 反向弹性速度
      }
      
      // 上边界
      if(ball.y - ball.r < box.y){
        ball.y = box.y + ball.r;
        ball.oldY = ball.y + originalVy * restitution; // 反向弹性速度
      }
      
      // 下边界
      if(ball.y + ball.r > box.y + box.h){
        ball.y = box.y + box.h - ball.r;
        ball.oldY = ball.y + originalVy * restitution; // 反向弹性速度
        // 添加摩擦力
        ball.oldX = ball.x + originalVx * 0.999;
      }
    }
  }

  function step(dt){
    const iterations = substeps;
    const subStep = dt / iterations;
    const gravity = parseFloat(gravityRange.value);
    
    for(let i = 0; i < iterations; i++){
      // Verlet积分更新位置
      for(const ball of balls){
        let velX = ball.x - ball.oldX;
        let velY = ball.y - ball.oldY;
        
        // 速度限制：禁止超过300
        const speed = Math.sqrt(velX * velX + velY * velY);
        if (speed > 80) {
          const scale = 80 / speed;
          velX *= scale;
          velY *= scale;
        }
        
        ball.oldX = ball.x;
        ball.oldY = ball.y;
        
        // 计算重力加速度
        const gravityAccel = gravity * subStep * subStep * 10;
        
        // 加速度限制：不能超过两倍的重力加速度
        const maxAccel = Math.abs(gravity * subStep * subStep * 10 * 2);
        let accelX = 0;
        let accelY = gravityAccel;
        
        const totalAccel = Math.sqrt(accelX * accelX + accelY * accelY);
        if (totalAccel > maxAccel) {
          const accelScale = maxAccel / totalAccel;
          accelX *= accelScale;
          accelY *= accelScale;
        }
        
        ball.x += velX;
        ball.y += velY + accelY; // 使用限制后的加速度
      }
      
      // 约束求解
      solveBallCollisions();
      solveBoundaryCollisions();
    }
  }

  function draw(){
    const box = containerSize();
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#000';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.strokeRect(box.x-1, box.y-1, box.w+2, box.h+2);
    
    // 如果没有图片，显示上传提示
    if (!avatarImageData) {
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = '16px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('点击上传图片', box.x + box.w/2, box.y + box.h/2 - 10);
      ctx.fillText('📷', box.x + box.w/2, box.y + box.h/2 + 20);
      ctx.textAlign = 'left';
      return;
    }
    
    for(let b of balls){
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
      ctx.fillStyle = b.color;
      ctx.fill();
    }
    ctx.fillStyle = '#fff';
    ctx.fillText(`Balls: ${balls.length}`, box.x + 8, box.y + 16);
  }

  function loop(t){
    const dt = 1/60; // 固定时间步长
    frameCount++;
    UIupdate();
    spawnStep(frameCount);
    if(running) {
      step(dt);
      checkStability(); // 检查小球稳定性
      checkAnimationStability(); // 检查动画模式下的静止状态
      if (isCalculating) {
        updateProgress();
      }
    }
    draw();
    requestAnimationFrame(loop);
  }
  
  requestAnimationFrame(loop);
})();
</script>
