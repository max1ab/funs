<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>五笔练习</title>
<link rel="stylesheet" href="/design-tokens.css">
<style>
  :root {
    --border: #e0d8cc;
    --bg: #f9f5ee;
    --surface: #fffdf9;
    --accent: #b55a10;
    --accent-dim: rgba(181,90,16,.12);
    --text: #2d261c;
    --text2: #8a7e6b;
    --text3: #b0a590;
    --green: #2d8a56;
    --red: #d14343;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; overflow: hidden;
    font-family: -apple-system,"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
    background: var(--bg); color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  .page {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh; height: 100dvh;
    overflow: hidden;
  }

  /* ── Top bar ── */
  .bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #fffdf9, #f7f2e8);
    flex-wrap: wrap;
  }
  .mode-switch {
    display: flex;
    gap: 4px;
    padding: 3px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: rgba(255,253,249,.72);
  }
  .mode-btn {
    border: 0;
    border-radius: 999px;
    padding: 7px 12px;
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }
  .mode-btn.active {
    background: var(--text);
    color: #f9f5ee;
  }
  .bar .big-char {
    font-size: 56px; font-weight: 500; line-height: 1;
    letter-spacing: -.03em; min-width: 80px; text-align: center;
  }
  .bar .decomp {
    font-size: 12px; color: var(--accent); font-weight: 600;
    min-width: 160px; max-width: 260px; text-align: left; line-height: 1.35;
  }
  .code-route {
    display: inline-flex;
    gap: 4px;
    align-items: center;
    flex-wrap: wrap;
  }
  .route-step {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    color: var(--text);
    white-space: nowrap;
  }
  .route-key {
    font-family: "SF Mono", "Consolas", monospace;
    font-size: 13px;
    font-weight: 800;
    color: var(--accent);
  }
  .route-label { color: var(--text2); font-size: 11px; }
  .decomp-label { color: var(--text2); font-weight: 500; }
  .decomp-flag { color: var(--text2); font-weight: 500; font-size: 11px; }
  .decomp-id {
    color: var(--accent);
    font-weight: 700;
    font-size: 11px;
  }
  .bar .input-group {
    display: flex; gap: 6px; flex: 1; max-width: 340px; min-width: 180px;
  }
  .bar .input-group input {
    flex: 1; padding: 10px 14px;
    font-family: "SF Mono","Consolas","Courier New",monospace;
    font-size: 22px; letter-spacing: .2em; text-transform: lowercase;
    border: 1.5px solid var(--border); border-radius: 8px;
    background: var(--surface); color: var(--text); outline: none; min-width: 0;
  }
  .bar .input-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
  .bar .input-group input.err { border-color: var(--red); }
  .bar .input-group button {
    padding: 0 18px; border: 0; border-radius: 8px;
    background: var(--text); color: #f9f5ee;
    font-weight: 700; font-size: 14px; cursor: pointer; white-space: nowrap;
  }
  .page.practice-mode .bar .input-group button {
    display: none;
  }
  .bar .hints {
    display: flex; gap: 5px;
  }
  .bar .hints button {
    padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px;
    background: transparent; font-size: 11px; color: var(--text2);
    cursor: pointer; white-space: nowrap; transition: all .15s;
  }
  .bar .hints button:hover { border-color: var(--accent); color: var(--accent); }
  .top-stats {
    margin-left: auto;
    color: var(--text2);
    font-size: 12px;
    line-height: 1.4;
    white-space: nowrap;
  }
  .top-stats strong { color: var(--text); font-weight: 700; }

  /* ── Keyboard body ── */
  .kb-body {
    display: flex; align-items: center; justify-content: center;
    position: relative;
    padding: 10px 14px; overflow: hidden;
  }
  .page.blind-mode {
    grid-template-rows: auto 0fr auto;
  }
  .page.blind-mode .kb-body {
    display: none;
  }
  .page.blind-mode .bar {
    min-height: calc(100vh - 48px);
    flex-direction: column;
    flex-wrap: nowrap;
    justify-content: center;
    align-items: center;
    align-content: center;
    gap: 16px;
    border-bottom: 0;
  }
  .page.blind-mode .mode-switch {
    order: 0;
  }
  .page.blind-mode .bar .big-char {
    order: 1;
    font-size: clamp(112px, 18vw, 190px);
    width: 100%;
    min-width: 0;
  }
  .page.blind-mode .bar .decomp {
    order: 2;
    width: min(720px, 100%);
    max-width: 720px;
    min-width: 0;
    text-align: center;
    font-size: 14px;
  }
  .page.blind-mode .bar .input-group {
    order: 3;
    width: min(560px, 100%);
    max-width: 560px;
    flex: 0 0 auto;
  }
  .page.blind-mode .bar .hints {
    order: 4;
    width: 100%;
    justify-content: center;
  }
  .page.blind-mode .top-stats {
    order: 5;
    width: 100%;
    justify-content: center;
    text-align: center;
    margin-left: 0;
  }
  .kb {
    display: grid;
    gap: 6px;
    width: 100%; max-width: 1300px;
  }
  .kb-row {
    display: grid; gap: 6px;
  }
  .kb-row.r0 { grid-template-columns: repeat(10, minmax(0, 1fr)); }
  .kb-row.r1 { grid-template-columns: .6fr repeat(9, minmax(0, 1fr)) .6fr; }
  .kb-row.r2 { grid-template-columns: 1.3fr repeat(7, minmax(0, 1fr)) 1.7fr; }

  .kb-key {
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    padding: 9px 7px 7px;
    display: flex;
    flex-direction: column;
    transition: all .15s;
    position: relative;
    min-width: 0;
  }
  .kb-key.zone-heng { background: #fff0e7; border-color: #ebc0ad; }
  .kb-key.zone-shu { background: #eef6e9; border-color: #bdd6b5; }
  .kb-key.zone-pie { background: #eaf5fb; border-color: #b8d4e2; }
  .kb-key.zone-na { background: #f6e8f1; border-color: #ddb8cf; }
  .kb-key.zone-zhe { background: #f7f1d5; border-color: #ddd08f; }
  .kb-key.hint {
    border-color: var(--accent);
    background: #fef5e8;
    box-shadow: 0 0 0 2px rgba(181,90,16,.25);
    z-index: 2;
    transform: scale(1.04);
  }
  .kb-key .k-top {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 5px;
  }
  .kb-key .k-letter {
    font-family: "SF Mono","Consolas",monospace;
    font-size: clamp(18px, 2.2vw, 28px);
    font-weight: 800; color: var(--text); line-height: 1;
  }
  .kb-key .k-zone {
    font-size: clamp(10px, 1.2vw, 13px);
    color: var(--text3); line-height: 1;
  }
  .kb-key .k-label {
    font-size: clamp(22px, 2.7vw, 34px);
    font-weight: 700; line-height: 1; margin-bottom: 6px;
    text-align: center;
  }
  .kb-key .k-roots {
    display: flex; flex-wrap: wrap; gap: 3px;
    justify-content: center; line-height: 1.35;
  }
  .kb-key .k-roots span {
    font-size: clamp(11px, 1.2vw, 15px);
    color: var(--text2); padding: 0 3px;
  }
  .kb-spacer { min-width: 0; }

  .id-code-card {
    position: absolute;
    right: 16px;
    bottom: 14px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: rgba(255,253,249,.88);
    box-shadow: 0 8px 24px rgba(45,38,28,.08);
    backdrop-filter: blur(10px);
    color: var(--text2);
    font-size: 11px;
    z-index: 3;
  }
  .id-code-card h3 {
    margin: 0 0 6px;
    color: var(--text);
    font-size: 12px;
    text-align: center;
  }
  .id-code-card table {
    border-collapse: collapse;
  }
  .id-code-card th,
  .id-code-card td {
    padding: 2px 5px;
    text-align: center;
    white-space: nowrap;
  }
  .id-code-card th {
    color: var(--text3);
    font-weight: 600;
  }
  .id-code-card td {
    color: var(--text);
    font-family: "SF Mono","Consolas",monospace;
    font-weight: 800;
  }
  .id-code-card .stroke {
    color: var(--text2);
    font-family: inherit;
    font-weight: 600;
  }

  /* ── Bottom bar ── */
  .bottom-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 8px 14px;
    border-top: 1px solid var(--border);
    background: rgba(255,253,249,.92);
  }
  .step-actions { display: flex; gap: 6px; align-items: center; }
  .step-actions button {
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
  }
  .step-actions button:hover { border-color: var(--accent); color: var(--accent); }
  .progress-line {
    color: var(--text2);
    font-size: 12px;
    text-align: right;
    white-space: nowrap;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    padding: 8px 18px; border-radius: 20px;
    font-size: 13px; font-weight: 600;
    background: var(--text); color: #f9f5ee;
    z-index: 10; pointer-events: none;
    opacity: 0; transition: opacity .3s;
  }
  .toast.show { opacity: 1; }
  .toast.ok { background: var(--green); }
  .toast.bad { background: var(--red); }

  @media (max-width: 640px) {
    .bar { gap: 8px; padding: 8px 10px; }
    .mode-switch { order: -2; }
    .mode-btn { padding: 6px 10px; font-size: 11px; }
    .bar .big-char { font-size: 42px; min-width: 60px; }
    .bar .input-group input { font-size: 18px; padding: 8px 10px; }
    .bar .hints { display: none; }
    .top-stats { width: 100%; margin-left: 0; text-align: center; font-size: 11px; }
    .kb-body { padding: 8px 4px; }
    .kb { gap: 2px; width: calc(100vw - 8px); max-width: calc(100vw - 8px); }
    .kb-row { gap: 2px; }
    .kb-key { padding: 4px 2px 2px; border-radius: 4px; overflow: hidden; }
    .kb-key .k-top { margin-bottom: 2px; }
    .kb-key .k-letter { font-size: 13px; }
    .kb-key .k-zone { font-size: 8px; }
    .kb-key .k-label { font-size: 17px; margin-bottom: 2px; }
    .kb-key .k-roots { gap: 1px; line-height: 1.25; }
    .kb-key .k-roots span { font-size: 8px; padding: 0 1px; }
    .id-code-card { display: none; }
    .bottom-bar { padding: 6px 8px; gap: 8px; }
    .step-actions { gap: 4px; }
    .step-actions button { padding: 6px 8px; font-size: 11px; }
    .progress-line { font-size: 11px; }
  }
</style>
</head>
<body>

<div class="page" id="page">
  <!-- ════ Practice bar ════ -->
  <div class="bar">
    <div class="mode-switch" aria-label="练习模式">
      <button class="mode-btn active" data-mode="lookup" type="button">练习</button>
      <button class="mode-btn" data-mode="blind" type="button">测验</button>
    </div>
    <div class="big-char" id="targetChar">字</div>
    <div class="decomp" id="decomp"></div>
    <div class="input-group">
      <input id="codeInput" placeholder="按键输入编码" autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="none">
      <button id="submitBtn">确认</button>
    </div>
    <div class="hints">
      <button id="hintDecomp">怎么拆</button>
      <button id="hintKeys">在哪键</button>
      <button id="hintCode">完整码</button>
      <button id="skipBtn">跳过</button>
    </div>
    <div class="top-stats" id="topStats">已练 <strong>0</strong> 字 · 准确率 <strong>0%</strong></div>
  </div>

  <!-- ════ Keyboard body ════ -->
  <div class="kb-body">
    <div class="kb" id="keyboard"></div>
    <div class="id-code-card" aria-label="识别码速查">
      <h3>识别码速查</h3>
      <table>
        <thead>
          <tr><th></th><th>左右</th><th>上下</th><th>杂合</th></tr>
        </thead>
        <tbody>
          <tr><th class="stroke">横</th><td>G</td><td>F</td><td>D</td></tr>
          <tr><th class="stroke">竖</th><td>H</td><td>J</td><td>K</td></tr>
          <tr><th class="stroke">撇</th><td>T</td><td>R</td><td>E</td></tr>
          <tr><th class="stroke">捺</th><td>Y</td><td>U</td><td>I</td></tr>
          <tr><th class="stroke">折</th><td>N</td><td>B</td><td>V</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="step-actions">
      <button id="bottomHintDecomp">怎么拆</button>
      <button id="bottomHintKeys">在哪键</button>
      <button id="bottomHintCode">完整码</button>
      <button id="bottomSkipBtn">跳过</button>
    </div>
    <div class="progress-line" id="progressLine">已练 0 · 准确率 0% · 连对 0</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STATE_KEY = 'wubi_kb_v2';
const KB_ROWS = [
  ['Q','W','E','R','T','Y','U','I','O','P'],
  ['A','S','D','F','G','H','J','K','L'],
  ['X','C','V','B','N','M']
];

const FALLBACK_ROOTS = [
  {key:'G',zone:'横',label:'王',roots:['王','一','五','戋','青头']},
  {key:'F',zone:'横',label:'土',roots:['土','士','二','干','十','寸','雨']},
  {key:'D',zone:'横',label:'大',roots:['大','犬','三','羊','古','石','厂']},
  {key:'S',zone:'横',label:'木',roots:['木','丁','西']},
  {key:'A',zone:'横',label:'工',roots:['工','戈','艹','廾','匚','七']},
  {key:'H',zone:'竖',label:'目',roots:['目','具','上','止','卜']},
  {key:'J',zone:'竖',label:'日',roots:['日','早','刂','虫']},
  {key:'K',zone:'竖',label:'口',roots:['口','川']},
  {key:'L',zone:'竖',label:'田',roots:['田','甲','囗','四','车','力']},
  {key:'M',zone:'竖',label:'山',roots:['山','由','贝','冂','几']},
  {key:'T',zone:'撇',label:'禾',roots:['禾','竹','丿','彳','攵','夂']},
  {key:'R',zone:'撇',label:'白',roots:['白','手','扌','斤']},
  {key:'E',zone:'撇',label:'月',roots:['月','彡','乃','用','豕']},
  {key:'W',zone:'撇',label:'人',roots:['人','亻','八','癶']},
  {key:'Q',zone:'撇',label:'金',roots:['金','钅','勹','儿','夕','鱼','犭','氏']},
  {key:'Y',zone:'捺',label:'言',roots:['言','讠','文','方','广','亠','丶']},
  {key:'U',zone:'捺',label:'立',roots:['立','辛','冫','丷','六','门','疒']},
  {key:'I',zone:'捺',label:'水',roots:['水','氵','小']},
  {key:'O',zone:'捺',label:'火',roots:['火','灬','米']},
  {key:'P',zone:'捺',label:'之',roots:['之','辶','宀','冖','礻','衤']},
  {key:'N',zone:'折',label:'已',roots:['已','巳','己','尸','心','忄','羽','乙']},
  {key:'B',zone:'折',label:'子',roots:['子','耳','了','也','凵']},
  {key:'V',zone:'折',label:'女',roots:['女','刀','九','臼','巛']},
  {key:'C',zone:'折',label:'又',roots:['又','巴','马','厶']},
  {key:'X',zone:'折',label:'纟',roots:['纟','弓','匕','幺']}
];

const FALLBACK_CHARS = [
  {char:'一',code:'g'},{char:'地',code:'f'},{char:'在',code:'d'},{char:'要',code:'s'},{char:'工',code:'a'},
  {char:'上',code:'h'},{char:'是',code:'j'},{char:'中',code:'k'},{char:'国',code:'l'},{char:'同',code:'m'},
  {char:'和',code:'t'},{char:'的',code:'r'},{char:'有',code:'e'},{char:'人',code:'w'},{char:'我',code:'q'},
  {char:'主',code:'y'},{char:'产',code:'u'},{char:'不',code:'i'},{char:'为',code:'o'},{char:'这',code:'p'},
  {char:'民',code:'n'},{char:'了',code:'b'},{char:'发',code:'v'},{char:'以',code:'c'},{char:'经',code:'x'}
];

let roots = [], chars = [], cur = null, hintIdx = 0, retry = false, mistake = false, locked = false, mode = localStorage.getItem('wubi_mode') || 'lookup';
let s = (() => { try { return JSON.parse(localStorage.getItem(STATE_KEY))||{}; } catch(_) { return {}; } })();
s.total = s.total||0; s.correct = s.correct||0; s.streak = s.streak||0;
s.wrongMap = s.wrongMap||{}; s.history = s.history||[];
function save() { localStorage.setItem(STATE_KEY, JSON.stringify(s)); updateStats(); }

const $ = id => document.getElementById(id);
const E = {
  page: $('page'), kb: $('keyboard'), tc: $('targetChar'), dec: $('decomp'),
  inp: $('codeInput'), sub: $('submitBtn'), toast: $('toast'),
  topStats: $('topStats'), progress: $('progressLine')
};

function byKey(k) { return roots.find(r => r.key.toLowerCase() === k.toLowerCase()); }
function spacer() { const d = document.createElement('div'); d.className = 'kb-spacer'; return d; }
function zoneClass(zone) { return ({横:'zone-heng', 竖:'zone-shu', 撇:'zone-pie', 捺:'zone-na', 折:'zone-zhe'})[zone] || ''; }
function applyMode(nextMode, shouldAdvance = false) {
  mode = nextMode;
  localStorage.setItem('wubi_mode', mode);
  E.page.classList.toggle('practice-mode', mode === 'lookup');
  E.page.classList.toggle('blind-mode', mode === 'blind');
  document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode));
  E.inp.readOnly = mode === 'lookup';
  E.inp.placeholder = mode === 'lookup' ? '按键输入编码' : '输入编码';
  if (shouldAdvance) next();
}

function renderKB() {
  E.kb.innerHTML = '';
  KB_ROWS.forEach((row, ri) => {
    const re = document.createElement('div');
    re.className = `kb-row r${ri}`;
    if (ri === 1) re.appendChild(spacer());
    if (ri === 2) re.appendChild(spacer());
    row.forEach(key => {
      const r = byKey(key); if (!r) return;
      const el = document.createElement('div');
      el.className = `kb-key ${zoneClass(r.zone)}`;
      el.dataset.key = r.key.toLowerCase();
      el.innerHTML = `<div class="k-top"><span class="k-letter">${r.key}</span><span class="k-zone">${r.zone}区</span></div>`
        + `<div class="k-label">${r.label}</div>`
        + `<div class="k-roots">${r.roots.map(x => `<span>${x}</span>`).join('')}</div>`;
      re.appendChild(el);
    });
    if (ri === 1) re.appendChild(spacer());
    if (ri === 2) re.appendChild(spacer());
    E.kb.appendChild(re);
  });
  highlightKeys('');
}
function highlightKeys(code) {
  const set = new Set((code||'').toLowerCase().split(''));
  document.querySelectorAll('.kb-key').forEach(el => el.classList.toggle('hint', set.has(el.dataset.key)));
}


function updateStats() {
  const total = s.total || 0;
  const accuracy = total ? Math.round((s.correct || 0) / total * 100) : 0;
  const wrongCount = Object.values(s.wrongMap || {}).filter(v => v.count > 0).length;
  if (E.topStats) E.topStats.innerHTML = `已练 <strong>${total}</strong> 字 · 准确率 <strong>${accuracy}%</strong>`;
  if (E.progress) E.progress.textContent = `已练 ${total} · 准确率 ${accuracy}% · 连对 ${s.streak || 0} · 错题 ${wrongCount}`;
}

function pick() {
  const wrong = Object.entries(s.wrongMap).filter(([,v]) => v.count > 0);
  if (wrong.length && Math.random() < .35) {
    const [ch] = wrong[Math.floor(Math.random()*wrong.length)];
    const f = chars.find(c => c.char === ch);
    if (f) return f;
  }
  const recent = new Set((s.history||[]).slice(-24));
  const pool = chars.filter(c => !recent.has(c.char));
  return (pool.length > 12 ? pool : chars)[Math.floor(Math.random()*(pool.length > 12 ? pool : chars).length)];
}
function next() {
  cur = pick(); hintIdx = 0; retry = false; mistake = false; locked = false;
  E.tc.textContent = cur.char; E.dec.innerHTML = '';
  E.inp.value = ''; E.inp.classList.remove('err'); E.sub.textContent = '确认';
  highlightKeys(''); toast(''); updateStats(); E.inp.focus();
}
function toast(t, cls) {
  E.toast.textContent = t; E.toast.className = `toast ${cls}` + (t ? ' show' : '');
  if (t) setTimeout(() => { E.toast.classList.remove('show'); }, 2000);
}
function submit() {
  if (!cur) return;
  const inp = E.inp.value.trim().toLowerCase(); if (!inp) return;
  const ans = cur.code.toLowerCase();
  if (retry) {
    s.total++; save();
    if (inp === ans) { s.correct++; s.streak++; delete s.wrongMap[cur.char]; toast('正确！','ok'); E.inp.classList.remove('err'); setTimeout(next, 500); }
    else { s.streak = 0; s.wrongMap[cur.char].count++; E.inp.value = ''; E.inp.classList.add('err'); toast(`还是不对，编码 ${ans}`,'bad'); save(); }
    return;
  }
  s.total++; s.history = [...(s.history||[]), cur.char].slice(-80); save();
  if (inp === ans) { s.correct++; s.streak++; delete s.wrongMap[cur.char]; toast('正确！','ok'); setTimeout(next, 500); }
  else {
    s.streak = 0; s.wrongMap[cur.char] = s.wrongMap[cur.char]||{code:ans,count:0};
    s.wrongMap[cur.char].count++; retry = true; hintIdx = ans.length; highlightKeys(ans);
    E.inp.value = ''; E.inp.classList.add('err'); E.sub.textContent = '重输';
    toast(`编码 ${ans}，请重打`,'bad'); save();
  }
}
function finishPractice() {
  if (!cur || locked) return;
  locked = true;
  const ans = cur.code.toLowerCase();
  s.total++;
  s.history = [...(s.history||[]), cur.char].slice(-80);
  if (mistake) {
    s.streak = 0;
    s.wrongMap[cur.char] = s.wrongMap[cur.char]||{code:ans,count:0};
    s.wrongMap[cur.char].count++;
    toast('完成，已记入错题','bad');
  } else {
    s.correct++;
    s.streak++;
    delete s.wrongMap[cur.char];
    toast('正确！','ok');
  }
  save();
  setTimeout(next, 450);
}
function handlePracticeKeydown(e) {
  if (mode !== 'lookup') {
    if (e.key === 'Enter') submit();
    return;
  }
  if (e.key === 'Tab') return;
  e.preventDefault();
  if (!cur || locked) return;
  if (e.key === 'Backspace' || e.key === 'Delete') {
    E.inp.value = E.inp.value.slice(0, -1);
    E.inp.classList.remove('err');
    highlightKeys(E.inp.value);
    return;
  }
  if (e.key === 'Escape') {
    E.inp.value = '';
    E.inp.classList.remove('err');
    highlightKeys('');
    return;
  }
  if (!/^[a-zA-Z]$/.test(e.key)) return;
  const key = e.key.toLowerCase();
  const ans = cur.code.toLowerCase();
  const pos = E.inp.value.length;
  if (key !== ans[pos]) {
    mistake = true;
    E.inp.classList.add('err');
    toast('不对','bad');
    return;
  }
  E.inp.classList.remove('err');
  E.inp.value += key;
  highlightKeys(E.inp.value);
  if (E.inp.value.length >= ans.length) finishPractice();
}
function currentAnalysis() {
  return cur || null;
}
function escapeHtml(value) {
  return String(value || '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function codeRouteText(code) {
  return String(code || '').toLowerCase().split('').map(key => {
    const root = byKey(key);
    const keyText = key.toUpperCase();
    return root ? `${keyText}${root.label}` : keyText;
  }).join(' + ');
}
function codeRouteHtml(code) {
  return escapeHtml(codeRouteText(code));
}
function idCodeFromFlag(flag) {
  const match = String(flag || '').match(/(横|竖|撇|捺|折)·(左右|上下|杂合)/);
  if (!match) return null;
  const table = {
    横: {左右:'G', 上下:'F', 杂合:'D'},
    竖: {左右:'H', 上下:'J', 杂合:'K'},
    撇: {左右:'T', 上下:'R', 杂合:'E'},
    捺: {左右:'Y', 上下:'U', 杂合:'I'},
    折: {左右:'N', 上下:'B', 杂合:'V'}
  };
  return {stroke: match[1], shape: match[2], key: table[match[1]][match[2]]};
}
function idCodeHtml(info) {
  const id = idCodeFromFlag(info && info.flag);
  if (!id) return '';
  return `<div class="decomp-id">识别码：${id.key}（${id.stroke} · ${id.shape}）</div>`;
}
function formatDecomp() {
  const info = currentAnalysis();
  if (!info) return '暂无解析';
  const flag = info.flag ? `<div class="decomp-flag">${escapeHtml(info.flag)}</div>` : '';
  const route = codeRouteHtml(info.code);
  const code = escapeHtml(info.code || '');
  const shortCode = info.shortCode ? `<div class="decomp-flag">简码：${escapeHtml(info.shortCode)}</div>` : '';
  return `<span class="code-route">${escapeHtml(info.char || cur.char)} = ${route} → ${code}</span>${flag}${idCodeHtml(info)}${shortCode}`;
}
function hintDecomp() { if (!cur) return; E.dec.innerHTML = formatDecomp(); }
function hintKeys() { if (!cur) return; hintIdx = cur.code.length; highlightKeys(cur.code); toast(`已高亮 ${cur.code} 键位`,''); }
function hintCode() {
  const info = currentAnalysis();
  if (!info) return;
  const shortCode = info.shortCode ? ` · 简码 ${info.shortCode}` : '';
  E.dec.innerHTML = `<span class="code-route">${escapeHtml(info.char || cur.char)} = ${codeRouteHtml(info.code)} → ${escapeHtml(info.code)}</span>${idCodeHtml(info)}${escapeHtml(shortCode)}`;
  toast(`完整编码：${info.code}`,'');
}
function skip() { if (!cur||retry) return; s.history = [...(s.history||[]), cur.char].slice(-80); s.streak=0; s.wrongMap[cur.char]=s.wrongMap[cur.char]||{code:cur.code,count:1}; s.wrongMap[cur.char].count++; save(); next(); }

async function init() {
  [roots, chars] = await Promise.all([
    fetch('/wubi-trainer/data/wubi86-roots.json').then(r => r.json()).catch(() => FALLBACK_ROOTS),
    fetch('/wubi-trainer/data/wubi86-chars.json').then(r => r.json()).catch(() => FALLBACK_CHARS)
  ]);
  renderKB();
  applyMode(mode, false);
  next();
}

E.sub.addEventListener('click', submit);
E.inp.addEventListener('keydown', handlePracticeKeydown);
E.inp.addEventListener('beforeinput', e => { if (mode === 'lookup') e.preventDefault(); });
E.inp.addEventListener('compositionstart', e => { if (mode === 'lookup') e.preventDefault(); });
$('hintDecomp').addEventListener('click', hintDecomp);
$('hintKeys').addEventListener('click', hintKeys);
$('hintCode').addEventListener('click', hintCode);
$('skipBtn').addEventListener('click', skip);
$('bottomHintDecomp').addEventListener('click', hintDecomp);
$('bottomHintKeys').addEventListener('click', hintKeys);
$('bottomHintCode').addEventListener('click', hintCode);
$('bottomSkipBtn').addEventListener('click', skip);
document.querySelectorAll('.mode-btn').forEach(btn => btn.addEventListener('click', () => applyMode(btn.dataset.mode, true)));
init();
</script>
</body>
