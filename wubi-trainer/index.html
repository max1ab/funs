<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>五笔查表练习</title>
  <link rel="stylesheet" href="/design-tokens.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-sans);
      color: var(--color-text);
      background:
        radial-gradient(circle at 20% 0%, rgba(221, 198, 166, .38), transparent 28rem),
        linear-gradient(180deg, #fbf7ef 0%, var(--color-bg) 100%);
    }
    button, input { font: inherit; }
    button { cursor: pointer; }
    .app {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 32px 24px 40px;
    }
    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
      margin-bottom: 24px;
    }
    .eyebrow {
      margin: 0 0 8px;
      color: var(--color-accent);
      font-size: 13px;
      letter-spacing: .18em;
      text-transform: uppercase;
      font-weight: 700;
    }
    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 48px);
      letter-spacing: -.04em;
      line-height: 1.08;
    }
    .subtitle {
      margin: 12px 0 0;
      max-width: 680px;
      color: var(--color-text-secondary);
      line-height: 1.8;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(76px, 1fr));
      gap: 10px;
      min-width: min(440px, 100%);
    }
    .stat {
      padding: 14px 16px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: rgba(255, 253, 248, .72);
      backdrop-filter: blur(12px);
      text-align: center;
    }
    .stat strong {
      display: block;
      font-family: var(--font-mono);
      font-size: 22px;
      line-height: 1;
    }
    .stat span {
      display: block;
      margin-top: 7px;
      color: var(--color-text-muted);
      font-size: 12px;
    }
    .workspace {
      display: grid;
      grid-template-columns: minmax(340px, 450px) minmax(520px, 1fr);
      gap: 20px;
      align-items: start;
    }
    .panel {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      background: rgba(255, 253, 248, .88);
      box-shadow: var(--shadow-xl);
    }
    .practice-panel {
      position: sticky;
      top: 20px;
      padding: 24px;
    }
    .mode-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 5px;
      border: 1px solid var(--color-border);
      border-radius: 999px;
      background: var(--color-surface2);
    }
    .mode-tab {
      border: 0;
      border-radius: 999px;
      padding: 11px 14px;
      background: transparent;
      color: var(--color-text-secondary);
      font-weight: 700;
    }
    .mode-tab.active {
      background: var(--color-surface);
      color: var(--color-text);
      box-shadow: 0 7px 18px rgba(95, 65, 36, .12);
    }
    .mode-note {
      min-height: 44px;
      margin: 14px 0 20px;
      color: var(--color-text-secondary);
      font-size: 14px;
      line-height: 1.6;
    }
    .char-card {
      display: grid;
      place-items: center;
      min-height: 210px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, #fffdfa, #f5ecde);
      position: relative;
      overflow: hidden;
    }
    .char-card::after {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(155, 95, 47, .12);
      border-radius: 20px;
      pointer-events: none;
    }
    .target-char {
      font-size: clamp(86px, 16vw, 140px);
      line-height: 1;
      font-weight: 500;
      letter-spacing: -.08em;
    }
    .char-info {
      margin: 14px 0 0;
      text-align: center;
      color: var(--color-text-secondary);
      font-size: 13px;
    }
    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 20px;
    }
    .code-input {
      width: 100%;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-surface);
      padding: 16px 18px;
      font-family: var(--font-mono);
      font-size: 28px;
      letter-spacing: .22em;
      text-transform: lowercase;
      outline: none;
      color: var(--color-text);
    }
    .code-input:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 4px rgba(155, 95, 47, .13);
    }
    .code-input.error {
      border-color: var(--color-error);
      box-shadow: 0 0 0 4px rgba(183, 91, 75, .14);
    }
    .primary-btn {
      border: 0;
      border-radius: var(--radius-md);
      padding: 0 22px;
      background: var(--color-text);
      color: #fffaf0;
      font-weight: 800;
    }
    .feedback {
      min-height: 34px;
      margin: 14px 0 0;
      color: var(--color-text-secondary);
      line-height: 1.7;
      text-align: center;
    }
    .feedback.good { color: var(--color-success); font-weight: 700; }
    .feedback.bad { color: var(--color-error); font-weight: 700; }
    .hint-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }
    .ghost-btn {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--color-text-secondary);
      padding: 10px 8px;
      font-size: 13px;
      font-weight: 700;
    }
    .ghost-btn:hover { color: var(--color-accent); border-color: var(--color-accent-dim); background: #fff8ef; }
    .table-panel { padding: 22px; }
    .table-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      margin-bottom: 18px;
    }
    .table-head h2 { margin: 0; font-size: 22px; letter-spacing: -.03em; }
    .table-head p { margin: 6px 0 0; color: var(--color-text-secondary); font-size: 14px; line-height: 1.6; }
    .search-box {
      width: min(260px, 100%);
      border: 1px solid var(--color-border);
      border-radius: 999px;
      background: var(--color-surface);
      padding: 11px 15px;
      outline: none;
    }
    .keyboard {
      display: grid;
      gap: 12px;
    }
    .key-row {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(10, minmax(0, 1fr));
    }
    .key-row.home { grid-template-columns: .45fr repeat(9, minmax(0, 1fr)) .45fr; }
    .key-row.bottom { grid-template-columns: 1.15fr repeat(7, minmax(0, 1fr)) 2.15fr; }
    .key-spacer { min-width: 0; }
    .root-key {
      min-height: 142px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: #fffaf2;
      padding: 12px;
      text-align: left;
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease, background .16s ease;
    }
    .root-key:hover, .root-key.active {
      transform: translateY(-2px);
      border-color: var(--color-accent);
      box-shadow: 0 14px 32px rgba(116, 78, 42, .14);
      background: #fff7e8;
    }
    .root-key.hinted {
      border-color: var(--color-accent);
      background: var(--color-accent-dim);
      box-shadow: 0 0 0 4px rgba(155, 95, 47, .12);
    }
    .key-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .key-letter {
      font-family: var(--font-mono);
      font-size: 22px;
      font-weight: 900;
    }
    .key-zone { color: var(--color-text-muted); font-size: 12px; }
    .key-label { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
    .key-mnemonic { color: var(--color-accent); font-size: 13px; line-height: 1.5; margin-bottom: 8px; }
    .root-list {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .root-chip {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(155, 95, 47, .14);
      border-radius: 999px;
      background: rgba(255, 253, 248, .74);
      padding: 3px 7px;
      font-size: 12px;
      color: var(--color-text-secondary);
      line-height: 1.2;
    }
    .detail-card {
      margin-top: 16px;
      padding: 16px;
      border: 1px dashed var(--color-border);
      border-radius: var(--radius-md);
      background: rgba(241, 234, 223, .55);
      color: var(--color-text-secondary);
      line-height: 1.8;
    }
    .mistakes {
      margin-top: 18px;
      border-top: 1px solid var(--color-border);
      padding-top: 16px;
    }
    .mistakes h3 { margin: 0 0 10px; font-size: 15px; }
    .mistake-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 32px;
      color: var(--color-text-muted);
      font-size: 13px;
    }
    .mistake-pill {
      border: 1px solid var(--color-border);
      border-radius: 999px;
      padding: 6px 10px;
      background: var(--color-surface);
      color: var(--color-text-secondary);
      font-family: var(--font-mono);
    }
    @media (max-width: 980px) {
      .site-header { display: block; }
      .stats { margin-top: 20px; }
      .workspace { grid-template-columns: 1fr; }
      .practice-panel { position: static; }
    }
    @media (max-width: 620px) {
      .app { padding: 20px 12px 28px; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .input-row { grid-template-columns: 1fr; }
      .primary-btn { min-height: 50px; }
      .hint-actions { grid-template-columns: 1fr; }
      .table-head { display: block; }
      .search-box { width: 100%; margin-top: 14px; }
      .key-row, .key-row.home, .key-row.bottom { grid-template-columns: 1fr; }
      .key-spacer { display: none; }
      .root-key { min-height: auto; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="site-header">
      <div>
        <p class="eyebrow">Wubi 86 Trainer</p>
        <h1>先查表，再盲打。</h1>
        <p class="subtitle">用详尽字根表辅助推导编码，再进入盲打检验。网页不做输入法，只训练五笔 86 的字根、键位与编码记忆。</p>
      </div>
      <section class="stats" aria-label="练习统计">
        <div class="stat"><strong id="totalCount">0</strong><span>练习</span></div>
        <div class="stat"><strong id="accuracy">0%</strong><span>准确率</span></div>
        <div class="stat"><strong id="streak">0</strong><span>连对</span></div>
        <div class="stat"><strong id="wrongCount">0</strong><span>错题</span></div>
      </section>
    </header>

    <section class="workspace">
      <aside class="panel practice-panel">
        <div class="mode-tabs" role="tablist" aria-label="练习模式">
          <button class="mode-tab active" data-mode="lookup" type="button">查表推导</button>
          <button class="mode-tab" data-mode="blind" type="button">盲打检验</button>
        </div>
        <p class="mode-note" id="modeNote">对照右侧字根表推导编码。提示不会直接替你完成，只会逐步高亮相关键位。</p>

        <div class="char-card">
          <div class="target-char" id="targetChar">字</div>
        </div>
        <p class="char-info" id="charInfo">五笔86 · 常用字</p>

        <div class="input-row">
          <input id="codeInput" class="code-input" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="输入编码" />
          <button id="submitBtn" class="primary-btn" type="button">确认</button>
        </div>
        <div id="feedback" class="feedback">按 Enter 确认，错了需要重打一遍。</div>

        <div class="hint-actions">
          <button id="hintFirst" class="ghost-btn" type="button">提示首码</button>
          <button id="hintNext" class="ghost-btn" type="button">提示下一码</button>
          <button id="hintAll" class="ghost-btn" type="button">显示答案</button>
        </div>

        <section class="mistakes">
          <h3>错题复练</h3>
          <div id="mistakeList" class="mistake-list">还没有错题。</div>
        </section>
      </aside>

      <section class="panel table-panel">
        <div class="table-head">
          <div>
            <h2>五笔 86 字根表</h2>
            <p>按真实键盘排列。每个键展示键位、区位、代表字、口诀与常用字根。</p>
          </div>
          <input id="rootSearch" class="search-box" placeholder="搜索键位 / 字根 / 口诀" />
        </div>
        <div id="keyboard" class="keyboard" aria-label="五笔86字根键盘"></div>
        <div id="keyDetail" class="detail-card">点击任意键，查看该键的完整字根与口诀。</div>
      </section>
    </section>
  </main>

  <script>
    const STATE_KEY = 'wubi_trainer_table_first_v1';
    const keyboardRows = [
      ['Q','W','E','R','T','Y','U','I','O','P'],
      ['A','S','D','F','G','H','J','K','L'],
      ['Z','X','C','V','B','N','M']
    ];
    const fallbackRoots = [
      {key:'G',zone:'横区',position:11,label:'王',name:'王旁青头',primaryChar:'一',mnemonic:'王旁青头戋五一',roots:['王','一','五','戋','青头']},
      {key:'F',zone:'横区',position:12,label:'土',name:'土士二干',primaryChar:'地',mnemonic:'土士二干十寸雨',roots:['土','士','二','干','十','寸','雨']},
      {key:'D',zone:'横区',position:13,label:'大',name:'大犬三羊',primaryChar:'在',mnemonic:'大犬三羊古石厂',roots:['大','犬','三','羊','古','石','厂']},
      {key:'S',zone:'横区',position:14,label:'木',name:'木丁西',primaryChar:'要',mnemonic:'木丁西',roots:['木','丁','西']},
      {key:'A',zone:'横区',position:15,label:'工',name:'工戈草头',primaryChar:'工',mnemonic:'工戈草头右框七',roots:['工','戈','艹','廾','匚','七']},
      {key:'H',zone:'竖区',position:21,label:'目',name:'目具上止',primaryChar:'上',mnemonic:'目具上止卜虎皮',roots:['目','具','上','止','卜','虎皮']},
      {key:'J',zone:'竖区',position:22,label:'日',name:'日早两竖',primaryChar:'是',mnemonic:'日早两竖与虫依',roots:['日','早','刂','虫']},
      {key:'K',zone:'竖区',position:23,label:'口',name:'口与川',primaryChar:'中',mnemonic:'口与川，字根稀',roots:['口','川']},
      {key:'L',zone:'竖区',position:24,label:'田',name:'田甲方框',primaryChar:'国',mnemonic:'田甲方框四车力',roots:['田','甲','囗','四','车','力']},
      {key:'M',zone:'竖区',position:25,label:'山',name:'山由贝',primaryChar:'同',mnemonic:'山由贝，下框几',roots:['山','由','贝','冂','几']},
      {key:'T',zone:'撇区',position:31,label:'禾',name:'禾竹一撇',primaryChar:'和',mnemonic:'禾竹一撇双人立，反文条头共三一',roots:['禾','竹','丿','彳','攵','夂']},
      {key:'R',zone:'撇区',position:32,label:'白',name:'白手看头',primaryChar:'的',mnemonic:'白手看头三二斤',roots:['白','手','扌','斤','看头']},
      {key:'E',zone:'撇区',position:33,label:'月',name:'月彡乃用',primaryChar:'有',mnemonic:'月彡乃用家衣底',roots:['月','彡','乃','用','豕']},
      {key:'W',zone:'撇区',position:34,label:'人',name:'人和八',primaryChar:'人',mnemonic:'人和八，三四里',roots:['人','亻','八','癶']},
      {key:'Q',zone:'撇区',position:35,label:'金',name:'金勺鱼儿',primaryChar:'我',mnemonic:'金勺缺点无尾鱼，犬旁留叉儿一点夕，氏无七',roots:['金','钅','勹','儿','夕','鱼','犭','氏']},
      {key:'Y',zone:'捺区',position:41,label:'言',name:'言文方广',primaryChar:'主',mnemonic:'言文方广在四一，高头一捺谁人去',roots:['言','讠','文','方','广','亠','丶']},
      {key:'U',zone:'捺区',position:42,label:'立',name:'立辛两点',primaryChar:'产',mnemonic:'立辛两点六门疒',roots:['立','辛','冫','丷','六','门','疒']},
      {key:'I',zone:'捺区',position:43,label:'水',name:'水旁兴头',primaryChar:'不',mnemonic:'水旁兴头小倒立',roots:['水','氵','小','兴头']},
      {key:'O',zone:'捺区',position:44,label:'火',name:'火业四点',primaryChar:'为',mnemonic:'火业头，四点米',roots:['火','业头','灬','米']},
      {key:'P',zone:'捺区',position:45,label:'之',name:'之宝盖',primaryChar:'这',mnemonic:'之宝盖，摘礻衤',roots:['之','辶','宀','冖','礻','衤']},
      {key:'N',zone:'折区',position:51,label:'已',name:'已巳己尸',primaryChar:'民',mnemonic:'已半巳满不出己，左框折尸心和羽',roots:['已','巳','己','尸','心','忄','羽','乙']},
      {key:'B',zone:'折区',position:52,label:'子',name:'子耳了也',primaryChar:'了',mnemonic:'子耳了也框向上',roots:['子','耳','了','也','凵']},
      {key:'V',zone:'折区',position:53,label:'女',name:'女刀九臼',primaryChar:'发',mnemonic:'女刀九臼山朝西',roots:['女','刀','九','臼','巛']},
      {key:'C',zone:'折区',position:54,label:'又',name:'又巴马',primaryChar:'以',mnemonic:'又巴马，丢矢矣',roots:['又','巴','马','厶']},
      {key:'X',zone:'折区',position:55,label:'纟',name:'纟弓匕',primaryChar:'经',mnemonic:'慈母无心弓和匕，幼无力',roots:['纟','弓','匕','幺']}
    ];
    const fallbackChars = [
      {char:'一',code:'g',difficulty:1},{char:'地',code:'f',difficulty:1},{char:'在',code:'d',difficulty:1},{char:'要',code:'s',difficulty:1},{char:'工',code:'a',difficulty:1},
      {char:'上',code:'h',difficulty:1},{char:'是',code:'j',difficulty:1},{char:'中',code:'k',difficulty:1},{char:'国',code:'l',difficulty:1},{char:'同',code:'m',difficulty:1},
      {char:'和',code:'t',difficulty:1},{char:'的',code:'r',difficulty:1},{char:'有',code:'e',difficulty:1},{char:'人',code:'w',difficulty:1},{char:'我',code:'q',difficulty:1},
      {char:'主',code:'y',difficulty:1},{char:'产',code:'u',difficulty:1},{char:'不',code:'i',difficulty:1},{char:'为',code:'o',difficulty:1},{char:'这',code:'p',difficulty:1},
      {char:'民',code:'n',difficulty:1},{char:'了',code:'b',difficulty:1},{char:'发',code:'v',difficulty:1},{char:'以',code:'c',difficulty:1},{char:'经',code:'x',difficulty:1}
    ];

    let roots = [];
    let chars = [];
    let mode = 'lookup';
    let current = null;
    let hintIndex = 0;
    let retry = false;
    let state = loadState();

    const $ = (id) => document.getElementById(id);
    const els = {
      keyboard: $('keyboard'), keyDetail: $('keyDetail'), targetChar: $('targetChar'), charInfo: $('charInfo'),
      input: $('codeInput'), submit: $('submitBtn'), feedback: $('feedback'), modeNote: $('modeNote'),
      total: $('totalCount'), accuracy: $('accuracy'), streak: $('streak'), wrongCount: $('wrongCount'),
      mistakeList: $('mistakeList'), rootSearch: $('rootSearch')
    };

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(STATE_KEY)) || { total: 0, correct: 0, streak: 0, wrongMap: {}, history: [] };
      } catch (_) {
        return { total: 0, correct: 0, streak: 0, wrongMap: {}, history: [] };
      }
    }
    function saveState() { localStorage.setItem(STATE_KEY, JSON.stringify(state)); }
    async function loadJson(path, fallback) {
      try {
        const response = await fetch(path);
        if (!response.ok) throw new Error(response.statusText);
        return await response.json();
      } catch (error) {
        console.warn(`Using fallback data for ${path}`, error);
        return fallback;
      }
    }
    function rootByKey(key) { return roots.find(root => root.key.toLowerCase() === key.toLowerCase()); }
    function renderKeyboard(filter = '') {
      const query = filter.trim().toLowerCase();
      els.keyboard.innerHTML = '';
      keyboardRows.forEach((row, index) => {
        const rowEl = document.createElement('div');
        rowEl.className = `key-row ${index === 1 ? 'home' : ''} ${index === 2 ? 'bottom' : ''}`;
        if (index === 1) rowEl.appendChild(spacer());
        if (index === 2) rowEl.appendChild(spacer());
        row.forEach(key => {
          const root = rootByKey(key);
          if (!root) return;
          const haystack = [root.key, root.zone, root.label, root.name, root.mnemonic, ...root.roots].join(' ').toLowerCase();
          const hidden = query && !haystack.includes(query);
          const card = document.createElement('button');
          card.type = 'button';
          card.className = 'root-key';
          card.dataset.key = root.key.toLowerCase();
          card.hidden = hidden;
          card.innerHTML = `
            <div class="key-top"><span class="key-letter">${root.key}</span><span class="key-zone">${root.zone} · ${root.position}</span></div>
            <div class="key-label">${root.label} <small>${root.name}</small></div>
            <div class="key-mnemonic">${root.mnemonic}</div>
            <div class="root-list">${root.roots.map(item => `<span class="root-chip">${item}</span>`).join('')}</div>
          `;
          card.addEventListener('click', () => showKeyDetail(root));
          rowEl.appendChild(card);
        });
        if (index === 1) rowEl.appendChild(spacer());
        if (index === 2) rowEl.appendChild(spacer());
        els.keyboard.appendChild(rowEl);
      });
      highlightKeys(current ? current.code.slice(0, hintIndex) : '');
    }
    function spacer() {
      const el = document.createElement('div');
      el.className = 'key-spacer';
      return el;
    }
    function showKeyDetail(root) {
      document.querySelectorAll('.root-key').forEach(el => el.classList.toggle('active', el.dataset.key === root.key.toLowerCase()));
      els.keyDetail.innerHTML = `<strong>${root.key} 键 · ${root.zone} · ${root.name}</strong><br>${root.mnemonic}<br>字根：${root.roots.join('、')}<br>代表字：${root.primaryChar}`;
    }
    function highlightKeys(code) {
      const active = new Set((code || '').toLowerCase().split(''));
      document.querySelectorAll('.root-key').forEach(el => {
        el.classList.toggle('hinted', active.has(el.dataset.key));
      });
    }
    function pickChar() {
      const wrongItems = Object.entries(state.wrongMap || {}).filter(([, item]) => item.count > 0);
      if (wrongItems.length && Math.random() < 0.35) {
        const [char] = wrongItems[Math.floor(Math.random() * wrongItems.length)];
        const found = chars.find(item => item.char === char);
        if (found) return found;
      }
      const recent = new Set((state.history || []).slice(-24));
      const pool = chars.filter(item => !recent.has(item.char));
      const source = pool.length > 12 ? pool : chars;
      return source[Math.floor(Math.random() * source.length)];
    }
    function showNextChar() {
      current = pickChar();
      hintIndex = 0;
      retry = false;
      els.targetChar.textContent = current.char;
      els.charInfo.textContent = `五笔86 · ${current.code.length} 码 · 难度 ${current.difficulty || 1}`;
      els.input.value = '';
      els.input.classList.remove('error');
      els.submit.textContent = '确认';
      setFeedback(mode === 'lookup' ? '对照字根表推导编码，必要时用分步提示。' : '不看表，直接输入完整编码。');
      highlightKeys('');
      els.input.focus();
      updateStats();
    }
    function setFeedback(text, type = '') {
      els.feedback.className = `feedback ${type}`.trim();
      els.feedback.textContent = text;
    }
    function updateStats() {
      const wrongEntries = Object.entries(state.wrongMap || {}).filter(([, item]) => item.count > 0);
      els.total.textContent = state.total || 0;
      els.accuracy.textContent = state.total ? `${Math.round((state.correct || 0) / state.total * 100)}%` : '0%';
      els.streak.textContent = state.streak || 0;
      els.wrongCount.textContent = wrongEntries.length;
      els.mistakeList.innerHTML = wrongEntries.length
        ? wrongEntries.sort((a, b) => b[1].count - a[1].count).slice(0, 18).map(([char, item]) => `<span class="mistake-pill">${char} ${item.code} ×${item.count}</span>`).join('')
        : '还没有错题。';
    }
    function submitAnswer() {
      if (!current) return;
      const input = els.input.value.trim().toLowerCase();
      if (!input) return;
      const answer = current.code.toLowerCase();
      if (retry) {
        if (input === answer) {
          state.total += 1;
          state.correct += 1;
          state.streak += 1;
          delete state.wrongMap[current.char];
          saveAndContinue('重输正确，继续下一题。', 'good');
        } else {
          state.streak = 0;
          state.wrongMap[current.char].count += 1;
          saveState();
          updateStats();
          els.input.value = '';
          els.input.classList.add('error');
          setFeedback(`还是不对。正确编码是 ${answer}，请重打一遍。`, 'bad');
        }
        return;
      }
      state.total += 1;
      state.history = [...(state.history || []), current.char].slice(-80);
      if (input === answer) {
        state.correct += 1;
        state.streak += 1;
        delete state.wrongMap[current.char];
        saveAndContinue('正确，手感慢慢建立起来了。', 'good');
      } else {
        state.streak = 0;
        state.wrongMap[current.char] = state.wrongMap[current.char] || { code: answer, count: 0 };
        state.wrongMap[current.char].count += 1;
        retry = true;
        hintIndex = answer.length;
        highlightKeys(answer);
        els.input.value = '';
        els.input.classList.add('error');
        els.submit.textContent = '重输';
        saveState();
        updateStats();
        setFeedback(`不对。正确编码是 ${answer}，请重打一遍再继续。`, 'bad');
      }
    }
    function saveAndContinue(text, type) {
      saveState();
      updateStats();
      setFeedback(text, type);
      els.input.classList.remove('error');
      setTimeout(showNextChar, 520);
    }
    function revealNext(count = 1) {
      if (!current) return;
      hintIndex = Math.min(current.code.length, hintIndex + count);
      const shown = current.code.slice(0, hintIndex);
      highlightKeys(shown);
      if (mode === 'lookup') {
        setFeedback(`已高亮前 ${hintIndex} 码：${shown}`);
      } else {
        setFeedback(`提示：${shown}${'·'.repeat(Math.max(0, current.code.length - hintIndex))}`);
      }
    }
    function revealAll() {
      if (!current) return;
      hintIndex = current.code.length;
      highlightKeys(current.code);
      setFeedback(`完整编码：${current.code}`);
    }
    function setMode(nextMode) {
      mode = nextMode;
      document.querySelectorAll('.mode-tab').forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode));
      els.modeNote.textContent = mode === 'lookup'
        ? '对照右侧字根表推导编码。提示会逐步高亮对应键位。'
        : '收起查表依赖，只看汉字输入编码，用来检验是否真正记住。';
      showNextChar();
    }
    async function init() {
      [roots, chars] = await Promise.all([
        loadJson('/wubi-trainer/data/wubi86-roots.json', fallbackRoots),
        loadJson('/wubi-trainer/data/wubi86-chars.json', fallbackChars)
      ]);
      renderKeyboard();
      showKeyDetail(roots[0]);
      updateStats();
      showNextChar();
    }

    document.querySelectorAll('.mode-tab').forEach(btn => btn.addEventListener('click', () => setMode(btn.dataset.mode)));
    els.submit.addEventListener('click', submitAnswer);
    els.input.addEventListener('keydown', event => { if (event.key === 'Enter') submitAnswer(); });
    $('hintFirst').addEventListener('click', () => { hintIndex = 0; revealNext(1); });
    $('hintNext').addEventListener('click', () => revealNext(1));
    $('hintAll').addEventListener('click', revealAll);
    els.rootSearch.addEventListener('input', () => renderKeyboard(els.rootSearch.value));
    init();
  </script>
</body>
</html>
